<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.8">
<title>GO RED Keno</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    font-family: Arial, sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .go-red-badge {
    background: #cc0000;
    border: 3px solid #ff4444;
    border-radius: 50%;
    width: 66px;
    height: 66px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 16px rgba(255,0,0,0.6);
    line-height: 1.1;
  }
  .go-red-badge span {
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    display: block;
  }
  .header-text h1 {
    font-size: 26px;
    font-weight: 900;
    color: #ff3333;
    text-shadow: 2px 2px 0 #000, 0 0 10px #ff0000;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header-text p {
    font-size: 11px;
    color: #ffaa00;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* ===== MAIN LAYOUT ===== */
  .main {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1040px;
  }

  /* ===== LEFT COLUMN ===== */
  .left-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 230px;
  }

  /* Ticket canvas container */
  .ticket-wrap {
    position: relative;
    width: 230px;
  }
  #ticketCanvas {
    width: 230px;
    height: auto;
    display: block;
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.9);
    cursor: default;
  }

  .ticket-label {
    font-size: 11px;
    color: #ffcc00;
    letter-spacing: 1px;
    text-align: center;
    font-weight: bold;
    text-transform: uppercase;
  }

  /* Payout table */
  .payout-box {
    background: rgba(0,0,0,0.7);
    border: 1px solid #660000;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    width: 230px;
    color: #ffcccc;
  }
  .payout-box h3 {
    text-align: center;
    color: #ff4444;
    font-size: 13px;
    margin-bottom: 5px;
    letter-spacing: 1px;
  }
  .pr {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px solid #3a0000;
  }
  .pr:last-child { border-bottom: none; }
  .pr.hl { color: #ffcc00; font-weight: bold; }

  .pick-info {
    font-size: 13px;
    color: #ffcc00;
    text-align: center;
    font-weight: bold;
    min-height: 18px;
  }
  .bet-info {
    font-size: 11px;
    color: #aaa;
    text-align: center;
  }

  /* ===== RIGHT COLUMN: KENO BOARD ===== */
  .right-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* The board itself */
  .keno-board-wrap {
    border: 3px solid #333;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
  }

  /* Top half: rows 1-40 */
  .board-section {
    display: grid;
    grid-template-columns: repeat(10, 50px);
  }
  .board-section.top { background: #1a3a6a; }
  .board-section.bottom { background: #1a3a6a; }

  /* Status bar between top and bottom */
  .status-bar-board {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 10px;
    font-size: 13px;
    font-weight: bold;
  }
  .status-bar-board .game-num { color: #fff; }
  .status-bar-board .unofficial { color: #ffcc00; }
  .status-bar-board .ball-count { color: #fff; }

  /* Individual cell */
  .kcell {
    width: 50px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    border: 1px solid #2a5a9a;
    background: #1a3a6a;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    user-select: none;
    position: relative;
  }
  .kcell:hover { background: #2a5aaa; }

  /* States */
  .kcell.chosen {
    background: #ffcc00;
    color: #000;
    border-color: #ffdd44;
    font-weight: 900;
  }
  .kcell.drawn {
    background: #cc0000;
    color: #fff;
    border-color: #ff4444;
  }
  .kcell.drawn.chosen {
    background: #ff6600;
    color: #fff;
    border-color: #ffcc00;
    box-shadow: inset 0 0 8px rgba(255,200,0,0.6);
    animation: matchFlash 0.4s ease;
  }
  @keyframes matchFlash {
    0%  { transform: scale(0.7); }
    60% { transform: scale(1.15); }
    100%{ transform: scale(1); }
  }
  .kcell.drawn-no-match {
    background: #cc0000;
    color: #fff;
    border-color: #ff4444;
  }

  /* Draw strip */
  .draw-strip-wrap {
    background: #0a0a0a;
    border: 2px solid #333;
    border-radius: 6px;
    padding: 6px 10px;
    width: 100%;
    max-width: 520px;
  }
  .draw-strip-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
    text-align: center;
  }
  .draw-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 36px;
  }
  .ds-ball {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    background: #cc0000;
    border: 2px solid #ff4444;
    color: #fff;
  }
  .ds-ball.match {
    background: #ff6600;
    border-color: #ffcc00;
    color: #fff;
  }

  /* Status + draw count */
  .draw-count {
    font-size: 13px;
    color: #aaa;
    text-align: center;
    letter-spacing: 1px;
  }
  .status-msg {
    font-size: 13px;
    color: #ff8888;
    text-align: center;
    letter-spacing: 1px;
    min-height: 18px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    padding: 11px 26px;
    font-size: 14px;
    font-weight: 900;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.15s;
  }
  .btn-play {
    background: linear-gradient(to bottom, #ff3333, #bb0000);
    color: #fff;
    box-shadow: 0 3px 10px rgba(200,0,0,0.6);
  }
  .btn-play:hover:not(:disabled) {
    background: linear-gradient(to bottom, #ff5555, #dd0000);
    transform: translateY(-1px);
  }
  .btn-play:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-reset {
    background: linear-gradient(to bottom, #555, #333);
    color: #fff;
  }
  .btn-reset:hover { background: linear-gradient(to bottom, #777, #555); }

  .speed-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #aaa;
  }
  .speed-ctrl select {
    background: #222;
    border: 1px solid #555;
    color: #ccc;
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 12px;
  }

  /* Result panel */
  .result-panel {
    background: rgba(0,0,0,0.85);
    border: 3px solid;
    border-radius: 10px;
    padding: 16px 28px;
    text-align: center;
    animation: popIn 0.4s ease;
  }
  .result-panel.win  { border-color: #ffcc00; box-shadow: 0 0 24px rgba(255,200,0,0.5); }
  .result-panel.loss { border-color: #880000; }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.8); }
    to   { opacity:1; transform:scale(1); }
  }
  .rt { font-size: 24px; font-weight: 900; letter-spacing: 2px; margin-bottom: 6px; }
  .rt.win  { color: #ffcc00; text-shadow: 0 0 12px #ff8800; }
  .rt.loss { color: #ff5555; }
  .rs { font-size: 14px; color: #ccc; margin: 3px 0; }
  .rs span { color: #fff; font-weight: bold; }
  .rp { font-size: 28px; color: #ffcc00; font-weight: 900; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="go-red-badge">
    <span>GO</span><span>RED</span>
  </div>
  <div class="header-text">
    <h1>Keno</h1>
    <p>Pick up to 5 • Match to win • $1 per game</p>
  </div>
</div>

<div class="main">

  <!-- LEFT: Ticket + Payout -->
  <div class="left-col">
    <div class="ticket-wrap">
      <canvas id="ticketCanvas" width="460" height="828"></canvas>
    </div>
    <div class="ticket-label">Tap numbers on the board to pick</div>
    <div class="pick-info" id="pickInfo">Choose up to 5 numbers</div>
    <div class="bet-info">$1.00 Regular Keno</div>
    <div class="payout-box">
      <h3>💰 Payout Table</h3>
      <div id="payoutRows"><div style="text-align:center;color:#777;font-size:11px">Pick numbers to see payouts</div></div>
    </div>
  </div>

  <!-- RIGHT: Board -->
  <div class="right-col">

    <div class="keno-board-wrap">
      <!-- Top section: 1-40 -->
      <div class="board-section top" id="boardTop"></div>

      <!-- Status bar -->
      <div class="status-bar-board">
        <span class="game-num" id="sbGame">Game —</span>
        <span class="unofficial" id="sbStatus">Select your numbers</span>
        <span class="ball-count" id="sbBall">Ball — of 20</span>
      </div>

      <!-- Bottom section: 41-80 -->
      <div class="board-section bottom" id="boardBottom"></div>
    </div>

    <div class="draw-strip-wrap">
      <div class="draw-strip-label">Numbers Drawn</div>
      <div class="draw-strip" id="drawStrip"></div>
    </div>

    <div class="draw-count" id="drawCount">— / 20 drawn</div>
    <div class="status-msg" id="statusMsg">Pick 1–5 numbers then press PLAY</div>

    <div class="controls">
      <button class="btn btn-play" id="playBtn" onclick="startGame()">▶ Play</button>
      <button class="btn btn-reset" onclick="resetGame()">↺ New Game</button>
      <div class="speed-ctrl">
        <label>Speed:</label>
        <select id="speedSel">
          <option value="700">Normal</option>
          <option value="250">Fast</option>
          <option value="60">Turbo</option>
        </select>
      </div>
    </div>

    <div id="resultDiv"></div>
  </div>
</div>

// Ticket grid layout (80 numbers on real ticket)
// The ticket image has two grids: 1-40 (top) and 41-80 (bottom)
// We'll draw yellow circles on chosen numbers
// Measured from the actual ticket image dimensions (460x828 canvas)
// Top grid: rows 1-4, each row 10 numbers, starting around y=255
// Bottom grid: rows 5-8, starting around y=505
const TICKET_COLS = 10;

// Approximate cell positions on the ticket image (canvas 460x828)
// Top block (numbers 1-40): starts ~y=247, each cell ~h=57, w=46
// Bottom block (41-80): starts ~y=487
const TOP_X0  = 8,  TOP_Y0  = 248, CELL_W = 44.5, CELL_H = 57;
const BOT_X0  = 8,  BOT_Y0  = 492;

function getTicketPos(n) {
  // n: 1-80
  const idx = n - 1;
  const row = Math.floor(idx / 10);
  const col = idx % 10;
  if (n <= 40) {
    return {
      x: TOP_X0 + col * CELL_W + CELL_W / 2,
      y: TOP_Y0 + row * CELL_H + CELL_H / 2
    };
  } else {
    const r2 = row - 4;
    return {
      x: BOT_X0 + col * CELL_W + CELL_W / 2,
      y: BOT_Y0 + r2 * CELL_H + CELL_H / 2
    };
  }
}

function drawTicket() {
  const canvas = document.getElementById('ticketCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(TICKET_IMG, 0, 0, canvas.width, canvas.height);

  // Draw chosen numbers
  chosen.forEach(n => {
    const pos = getTicketPos(n);
    // Red circle fill
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 16, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200,0,0,0.82)';
    ctx.fill();
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Number text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n, pos.x, pos.y);
  });

  // Draw matched (hit) numbers in orange/gold
  if (drawn.length > 0) {
    const drawnSet = new Set(drawn);
    chosen.forEach(n => {
      if (drawnSet.has(n)) {
        const pos = getTicketPos(n);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 16, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,140,0,0.92)';
        ctx.fill();
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(n, pos.x, pos.y);
      }
    });
  }
}

TICKET_IMG.onload = function() {
  drawTicket();
};

// ===== BUILD BOARD =====
function buildBoard() {
  const top = document.getElementById('boardTop');
  const bot = document.getElementById('boardBottom');
  top.innerHTML = '';
  bot.innerHTML = '';
  for (let i = 1; i <= 80; i++) {
    const cell = document.createElement('div');
    cell.className = 'kcell';
    cell.textContent = i;
    cell.id = `k${i}`;
    cell.onclick = () => togglePick(i);
    if (i <= 40) top.appendChild(cell);
    else bot.appendChild(cell);
  }
}

// ===== PICKS =====
function togglePick(n) {
  if (running) return;
  if (drawn.length > 0) return;

  if (chosen.has(n)) {
    chosen.delete(n);
    document.getElementById(`k${n}`).classList.remove('chosen');
  } else {
    if (chosen.size >= 5) {
      document.getElementById('statusMsg').textContent = 'Max 5 picks!';
      return;
    }
    chosen.add(n);
    document.getElementById(`k${n}`).classList.add('chosen');
  }
  updatePickInfo();
  updatePayoutTable();
  drawTicket();
}

function updatePickInfo() {
  const n = chosen.size;
  document.getElementById('pickInfo').textContent =
    n === 0 ? 'Choose up to 5 numbers' :
    n === 5 ? `You picked 5 numbers — Ready!` :
    `Picked ${n} number${n>1?'s':''} (${5-n} more OK)`;
}

function updatePayoutTable(matchCount) {
  const n = chosen.size;
  const rows = document.getElementById('payoutRows');
  if (n === 0) {
    rows.innerHTML = '<div style="text-align:center;color:#777;font-size:11px">Pick numbers to see payouts</div>';
    return;
  }
  const table = PAYOUT_LABELS[n] || [];
  let html = `<div class="pr"><span>You picked</span><span>${n}</span></div>`;
  table.forEach(r => {
    const hl = (matchCount !== undefined && matchCount === r.m) ? ' hl' : '';
    html += `<div class="pr${hl}"><span>Match ${r.m}</span><span>$${r.p}.00</span></div>`;
  });
  rows.innerHTML = html;
}

// ===== GAME =====
function startGame() {
  if (running) return;
  if (chosen.size === 0) {
    document.getElementById('statusMsg').textContent = 'Pick at least 1 number!';
    return;
  }
  // Reset visuals
  for (let i = 1; i <= 80; i++) {
    const c = document.getElementById(`k${i}`);
    c.classList.remove('drawn','drawn-no-match');
    if (!chosen.has(i)) c.classList.remove('chosen');
  }
  document.getElementById('drawStrip').innerHTML = '';
  document.getElementById('resultDiv').innerHTML = '';
  document.getElementById('drawCount').textContent = '0 / 20 drawn';
  document.getElementById('sbStatus').textContent = 'Unofficial';
  document.getElementById('sbGame').textContent = `Game ${gameNum}`;
  document.getElementById('sbBall').textContent = 'Ball 0 of 20';
  document.getElementById('statusMsg').textContent = 'Drawing…';
  document.getElementById('playBtn').disabled = true;

  // Shuffle and pick 20
  const pool = Array.from({length:80},(_,i)=>i+1);
  for (let i=pool.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  drawn = pool.slice(0, 20);
  running = true;
  drawNext(0);
}

function drawNext(idx) {
  if (idx >= 20) { finishGame(); return; }
  const speed = parseInt(document.getElementById('speedSel').value);
  const n = drawn[idx];
  const isMatch = chosen.has(n);

  // Board cell
  const cell = document.getElementById(`k${n}`);
  cell.classList.remove('chosen');
  if (isMatch) {
    cell.classList.add('drawn');        // orange (drawn + chosen)
  } else {
    cell.classList.add('drawn-no-match'); // red only
    cell.classList.add('drawn');
  }

  // Draw strip
  const db = document.createElement('div');
  db.className = 'ds-ball' + (isMatch ? ' match' : '');
  db.textContent = n;
  document.getElementById('drawStrip').appendChild(db);

  // Status bar
  document.getElementById('sbBall').textContent = `Ball ${idx+1} of 20`;
  document.getElementById('drawCount').textContent = `${idx+1} / 20 drawn`;

  // Redraw ticket to show hit
  if (isMatch) drawTicket();

  setTimeout(() => drawNext(idx+1), speed);
}

function finishGame() {
  running = false;
  const drawnSet = new Set(drawn);
  const matches = [...chosen].filter(n => drawnSet.has(n)).length;
  const picks = chosen.size;
  const payMap = PAYOUTS[picks] || {};
  const prize = payMap[matches] || 0;
  const isWin = prize > 0;

  document.getElementById('sbStatus').textContent = isWin ? '🏆 WINNER!' : 'No Match';
  document.getElementById('statusMsg').textContent =
    isWin ? `Matched ${matches} — You won $${prize}.00!` :
    `Matched ${matches} of ${picks}. Better luck next time!`;

  updatePayoutTable(matches);
  drawTicket();

  document.getElementById('resultDiv').innerHTML = `
    <div class="result-panel ${isWin?'win':'loss'}">
      <div class="rt ${isWin?'win':'loss'}">${isWin?'🎉 WINNER!':'No Win'}</div>
      <div class="rs">Picked: <span>${picks}</span></div>
      <div class="rs">Matched: <span>${matches} of 20</span></div>
      ${isWin ? `<div class="rp">+$${prize}.00</div>` :
        '<div style="color:#aa4444;margin-top:6px;font-size:13px">Try again!</div>'}
    </div>`;

  document.getElementById('playBtn').disabled = false;
  document.getElementById('playBtn').textContent = '▶ Play Again';
  document.getElementById('playBtn').onclick = function() { resetGame(); };
}

function resetGame() {
  if (running) return;
  chosen.clear();
  drawn = [];
  running = false;
  gameNum = Math.floor(Math.random()*900)+100;

  buildBoard();
  document.getElementById('drawStrip').innerHTML = '';
  document.getElementById('resultDiv').innerHTML = '';
  document.getElementById('drawCount').textContent = '— / 20 drawn';
  document.getElementById('sbGame').textContent = 'Game —';
  document.getElementById('sbStatus').textContent = 'Select your numbers';
  document.getElementById('sbBall').textContent = 'Ball — of 20';
  document.getElementById('statusMsg').textContent = 'Pick 1–5 numbers then press PLAY';
  document.getElementById('playBtn').disabled = false;
  document.getElementById('playBtn').textContent = '▶ Play';
  document.getElementById('playBtn').onclick = startGame;
  updatePickInfo();
  updatePayoutTable();
  drawTicket();
}

// Init
buildBoard();
drawTicket();
updatePayoutTable();
</script>
