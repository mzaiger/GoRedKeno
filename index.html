<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.6">
<title>GO RED Keno</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── WALLET HUD ── */
  .wallet-hud {
    width: 100%;
    background: #1a0000;
    border-bottom: 2px solid #cc0000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 2px 16px rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
    z-index: 200;
  }
  .hud-balance {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 8px #ffd70066;
    letter-spacing: 1px;
  }
  .hud-balance .hud-label {
    font-size: 9px;
    color: #884444;
    letter-spacing: 2px;
    font-weight: normal;
    display: block;
    margin-bottom: 1px;
  }
  .hud-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .hud-btn {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 6px;
    border: 2px solid;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, filter 0.15s;
    background: none;
  }
  .hud-btn:hover { transform: scale(1.06); filter: brightness(1.15); }
  .btn-wallet { background: #1a1a00; border-color: #ffd700; color: #ffd700; }
  .btn-play   { background: #cc0000; border-color: #ff4444; color: #fff; }
  .btn-play:disabled {
    background: #550000; border-color: #660000; color: #aa6666;
    cursor: not-allowed; transform: none; filter: none;
  }

  /* ── TOAST ── */
  .hud-toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-120%);
    background: #0d0d1a;
    border: 2px solid #ffd700;
    border-radius: 10px;
    padding: 12px 24px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    color: #ffd700;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 30px rgba(0,0,0,0.8);
    text-align: center;
    max-width: 90vw;
  }
  .hud-toast.show { transform: translateX(-50%) translateY(0); }
  .hud-toast.win  { border-color: #00ff88; color: #00ff88; }
  .hud-toast.lose { border-color: #ff3344; color: #ff3344; }

  /* ── BLOCKED OVERLAY ── */
  .blocked-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .blocked-overlay.show { display: flex; }
  .blocked-overlay .bo-icon { font-size: 48px; }
  .blocked-overlay .bo-msg {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #ff3344;
    letter-spacing: 2px;
  }
  .blocked-overlay .bo-sub {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #aa5555;
    letter-spacing: 1px;
  }
  .btn-go-wallet {
    display: inline-block;
    background: #1a1a00;
    border: 2px solid #ffd700;
    color: #ffd700;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-go-wallet:hover { transform: scale(1.05); }

  /* ── GAME IFRAME ── */
  .game-wrap {
    width: 100%;
    flex: 1;
    position: relative;
  }
  .game-wrap iframe {
    width: 100%;
    height: calc(100vh - 56px);
    border: none;
    display: block;
    background: #111;
  }
</style>
</head>
<body>

<!-- WALLET HUD -->
<div class="wallet-hud">
  <div class="hud-balance">
    <span class="hud-label">WALLET</span>
    $<span id="hudAmt">0</span>.00
  </div>
  <div class="hud-actions">
    <a class="hud-btn btn-wallet" href="../wallet/index.html">← WALLET</a>
    <button class="hud-btn btn-play" id="btnPlayKeno" onclick="spendAndPlay()">▶ NEW GAME ($1)</button>
  </div>
</div>

<!-- TOAST -->
<div class="hud-toast" id="hudToast"></div>

<!-- BLOCKED OVERLAY -->
<div class="blocked-overlay" id="blockedOverlay">
  <div class="bo-icon">⛔</div>
  <div class="bo-msg">OUT OF CREDITS</div>
  <div class="bo-sub">You need at least $1.00 to play GO RED Keno.</div>
  <a class="btn-go-wallet" href="../wallet/index.html">GO TO WALLET</a>
</div>

<!-- THE GAME -->
<div class="game-wrap">
  <iframe id="kenoFrame" src="GoRedKeno.html" title="GO RED Keno" allowtransparency="true"></iframe>
</div>

<script>
// ─── WALLET HELPERS ──────────────────────────────────────────────────────────
const WALLET_KEY = 'arcade_wallet';

function getBalance() {
  const v = localStorage.getItem(WALLET_KEY);
  if (v === null) { localStorage.setItem(WALLET_KEY, '20'); return 20; }
  return parseFloat(v) || 0;
}
function setBalance(val) {
  const clamped = Math.max(0, Math.round(val * 100) / 100);
  localStorage.setItem(WALLET_KEY, String(clamped));
  return clamped;
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let _toastTmr;
function toast(msg, type) {
  const t = document.getElementById('hudToast');
  t.textContent = msg;
  t.className = 'hud-toast show ' + (type || '');
  clearTimeout(_toastTmr);
  _toastTmr = setTimeout(() => t.classList.remove('show'), 4000);
}

// ─── RENDER HUD ───────────────────────────────────────────────────────────────
function renderHud() {
  const bal = getBalance();
  document.getElementById('hudAmt').textContent = bal.toFixed(0);
  const btn = document.getElementById('btnPlayKeno');
  if (bal <= 0) {
    btn.disabled = true;
    document.getElementById('blockedOverlay').classList.add('show');
  } else {
    btn.disabled = false;
    document.getElementById('blockedOverlay').classList.remove('show');
  }
}

// ─── SPEND $1 AND TRIGGER GAME ───────────────────────────────────────────────
function spendAndPlay() {
  const bal = getBalance();
  if (bal <= 0) { renderHud(); return; }
  const newBal = setBalance(bal - 1);
  renderHud();
  toast('-$1.00 · Balance: $' + newBal, '');
  try {
    const fw = document.getElementById('kenoFrame').contentWindow;
    if (typeof fw.startGame === 'function') fw.startGame();
    else if (typeof fw.playAgain === 'function') fw.playAgain();
  } catch(e) {}
}

// ─── RESULT TRACKING STATE ────────────────────────────────────────────────────
// Prevents double-crediting the same game result
let lastCreditedGameNum = null;
let observerAttached = false;

// ─── ATTACH MUTATION OBSERVER TO #resultDiv INSIDE IFRAME ────────────────────
function attachResultObserver(fw) {
  if (observerAttached) return;

  const resultDiv = fw.document.getElementById('resultDiv');
  if (!resultDiv) {
    // DOM not ready yet — retry shortly
    setTimeout(() => attachResultObserver(fw), 300);
    return;
  }

  observerAttached = true;
  console.log('[Wallet] MutationObserver attached to #resultDiv');

  const observer = new MutationObserver(function() {
    checkForWin(fw);
  });

  observer.observe(resultDiv, { childList: true, subtree: true });
}

// ─── CHECK WIN INSIDE IFRAME ──────────────────────────────────────────────────
function checkForWin(fw) {
  try {
    // Only fire when game is OFFICIAL (finished)
    const sbStatus = fw.document.getElementById('sbStatus');
    if (!sbStatus || sbStatus.textContent.trim() !== 'OFFICIAL') return;

    // Get the current game number to avoid double crediting
    const currentGameNum = fw.gameNum || null;
    if (currentGameNum !== null && currentGameNum === lastCreditedGameNum) return;

    // Look for the win panel: .result-panel.win and .rp with "+$X.00"
    const winPanel = fw.document.querySelector('.result-panel.win');
    if (!winPanel) return; // loss — nothing to credit

    const rpEl = winPanel.querySelector('.rp');
    if (!rpEl) return;

    const match = rpEl.textContent.match(/\$([0-9]+)/);
    if (!match) return;

    const prize = parseInt(match[1], 10);
    if (!prize || prize <= 0) return;

    // Credit the win
    lastCreditedGameNum = currentGameNum;
    const newBal = setBalance(getBalance() + prize);
    renderHud();
    toast('🎉 Matched! You won $' + prize + '! Balance: $' + newBal, 'win');
    console.log('[Wallet] Win credited: $' + prize + ' — new balance $' + newBal);

  } catch(e) {
    console.warn('[Wallet] checkForWin error:', e);
  }
}

// ─── ALSO PATCH startGame / playAgain SO IFRAME BUTTONS COST $1 ──────────────
function patchIframeFunctions(fw) {
  try {
    // Patch startGame
    if (typeof fw.startGame === 'function' && !fw._walletPatched_startGame) {
      const orig = fw.startGame;
      fw.startGame = function() {
        const bal = getBalance();
        if (bal <= 0) { renderHud(); return; }
        const newBal = setBalance(bal - 1);
        renderHud();
        toast('-$1.00 · Balance: $' + newBal, '');
        orig.call(fw);
      };
      fw._walletPatched_startGame = true;
    }

    // Patch playAgain
    if (typeof fw.playAgain === 'function' && !fw._walletPatched_playAgain) {
      const orig = fw.playAgain;
      fw.playAgain = function() {
        const bal = getBalance();
        if (bal <= 0) { renderHud(); return; }
        const newBal = setBalance(bal - 1);
        renderHud();
        toast('-$1.00 · Balance: $' + newBal, '');
        orig.call(fw);
      };
      fw._walletPatched_playAgain = true;
    }

    console.log('[Wallet] iframe functions patched');
  } catch(e) {
    console.warn('[Wallet] patchIframeFunctions error:', e);
  }
}

// ─── IFRAME LOAD HANDLER ──────────────────────────────────────────────────────
document.getElementById('kenoFrame').addEventListener('load', function() {
  observerAttached = false; // reset on each load
  lastCreditedGameNum = null;

  try {
    const fw = this.contentWindow;

    // Give the iframe scripts a moment to fully execute
    setTimeout(function() {
      patchIframeFunctions(fw);
      attachResultObserver(fw);
    }, 200);

  } catch(e) {
    console.warn('[Wallet] iframe load handler error:', e);
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderHud();
</script>
</body>
</html>
