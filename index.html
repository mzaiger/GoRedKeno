<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.6">
<title>GO RED Keno</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    font-family: 'Arial', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── CENTER POPUP ── */
  .center-popup {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .center-popup.show { display: flex; }
  .center-popup-inner {
    background: #1a0000;
    border: 3px solid #ffd700;
    border-radius: 18px;
    padding: 28px 48px;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #ffd700;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,215,0,0.35), 0 8px 40px rgba(0,0,0,0.9);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 80vw;
    line-height: 1.4;
  }
  .center-popup.win .center-popup-inner  { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 60px rgba(0,255,136,0.35), 0 8px 40px rgba(0,0,0,0.9); }
  .center-popup.lose .center-popup-inner { border-color: #ff3344; color: #ff3344; }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ── BLOCKED OVERLAY ── */
  .blocked-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .blocked-overlay.show { display: flex; }
  .blocked-overlay .bo-icon { font-size: 48px; }
  .blocked-overlay .bo-msg {
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: #ff3344;
    letter-spacing: 2px;
  }
  .blocked-overlay .bo-sub {
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: #aa5555;
    letter-spacing: 1px;
  }
  .btn-go-wallet {
    display: inline-block;
    background: #1a1a00;
    border: 2px solid #ffd700;
    color: #ffd700;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-go-wallet:hover { transform: scale(1.05); }

  /* ── GAME IFRAME ── */
  .game-wrap { width: 100%; flex: 1; position: relative; }
  .game-wrap iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
    background: #111;
  }
</style>
</head>
<body>

<!-- CENTER POPUP -->
<div class="center-popup" id="centerPopup">
  <div class="center-popup-inner" id="centerPopupMsg"></div>
</div>

<!-- BLOCKED OVERLAY -->
<div class="blocked-overlay" id="blockedOverlay">
  <div class="bo-icon">⛔</div>
  <div class="bo-msg">OUT OF CREDITS</div>
  <div class="bo-sub">You need at least $1.00 to play GO RED Keno.</div>
  <a class="btn-go-wallet" href="../wallet/index.html">GO TO WALLET</a>
</div>

<!-- THE GAME -->
<div class="game-wrap">
  <iframe id="kenoFrame" src="GoRedKeno.html" title="GO RED Keno" allowtransparency="true"></iframe>
</div>

<script>
const WALLET_KEY = 'arcade_wallet';

function getBalance() {
  const v = localStorage.getItem(WALLET_KEY);
  if (v === null) { localStorage.setItem(WALLET_KEY, '20'); return 20; }
  return parseFloat(v) || 0;
}
function setBalance(val) {
  const clamped = Math.max(0, Math.round(val * 100) / 100);
  localStorage.setItem(WALLET_KEY, String(clamped));
  return clamped;
}

let _popTmr;
function popup(msg, type) {
  const el = document.getElementById('centerPopup');
  const msgEl = document.getElementById('centerPopupMsg');
  msgEl.textContent = msg;
  el.className = 'center-popup show ' + (type || '');
  clearTimeout(_popTmr);
  _popTmr = setTimeout(() => el.classList.remove('show'), 3500);
}

function renderHud() {
  const bal = getBalance();
  if (bal <= 0) document.getElementById('blockedOverlay').classList.add('show');
  else document.getElementById('blockedOverlay').classList.remove('show');
}

// ── Charge $1 helper — returns true if charge succeeded ──────────────────────
function charge() {
  const bal = getBalance();
  if (bal <= 0) { renderHud(); return false; }
  const newBal = setBalance(bal - 1);
  renderHud();
  popup('-$1.00  ·  Balance: $' + newBal, '');
  return true;
}

// ── Patch iframe functions ────────────────────────────────────────────────────
function patchIframeFunctions(fw) {
  try {
    // ── startGame: only charge if chosen.size >= 1 ──────────────────────────
    // The game's own startGame() already guards chosen.size === 0 and shows
    // "Pick at least 1 number!" — we just add the wallet charge before it runs.
    if (typeof fw.startGame === 'function' && !fw._walletPatched_startGame) {
      const orig = fw.startGame;
      fw.startGame = function() {
        // fw.chosen is the actual Set declared in GoRedKeno.html (line 528)
        if (!fw.chosen || fw.chosen.size === 0) {
          // No numbers selected — let the game show its own message, no charge
          orig.call(fw);
          return;
        }
        if (!charge()) return;  // out of credits — block
        orig.call(fw);
      };
      fw._walletPatched_startGame = true;
    }

    // ── playAgain: always charge $1 (picks are kept from the previous game) ──
    if (typeof fw.playAgain === 'function' && !fw._walletPatched_playAgain) {
      const orig = fw.playAgain;
      fw.playAgain = function() {
        if (!charge()) return;
        orig.call(fw);
      };
      fw._walletPatched_playAgain = true;
    }

    // ── resetGame (New Game button): no charge, just resets ──────────────────
    // No patch needed — resetGame only clears state, doesn't play.

  } catch(e) {
    console.warn('[Wallet] patchIframeFunctions error:', e);
  }
}

// ── Win detection ─────────────────────────────────────────────────────────────
let lastCreditedGameNum = null;
let observerAttached = false;

function attachResultObserver(fw) {
  if (observerAttached) return;
  const resultDiv = fw.document.getElementById('resultDiv');
  if (!resultDiv) { setTimeout(() => attachResultObserver(fw), 300); return; }
  observerAttached = true;
  const observer = new MutationObserver(function() { checkForWin(fw); });
  observer.observe(resultDiv, { childList: true, subtree: true });
}

function checkForWin(fw) {
  try {
    const sbStatus = fw.document.getElementById('sbStatus');
    if (!sbStatus || sbStatus.textContent.trim() !== 'OFFICIAL') return;
    const currentGameNum = fw.gameNum || null;
    if (currentGameNum !== null && currentGameNum === lastCreditedGameNum) return;
    const winPanel = fw.document.querySelector('.result-panel.win');
    if (!winPanel) return;
    const rpEl = winPanel.querySelector('.rp');
    if (!rpEl) return;
    const match = rpEl.textContent.match(/\$([0-9]+)/);
    if (!match) return;
    const prize = parseInt(match[1], 10);
    if (!prize || prize <= 0) return;
    lastCreditedGameNum = currentGameNum;
    const newBal = setBalance(getBalance() + prize);
    renderHud();
    popup('🎉  Matched!  You won $' + prize + '!\nBalance: $' + newBal, 'win');
  } catch(e) {}
}

// ── Iframe load ───────────────────────────────────────────────────────────────
document.getElementById('kenoFrame').addEventListener('load', function() {
  observerAttached = false;
  lastCreditedGameNum = null;
  try {
    const fw = this.contentWindow;
    setTimeout(function() {
      patchIframeFunctions(fw);
      attachResultObserver(fw);
    }, 200);
  } catch(e) {}
});

renderHud();
</script>
</body>
</html>
